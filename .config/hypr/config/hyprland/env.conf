env = XCURSOR_SIZE, 24
env = XCURSOR_THEME, Adwaita

env = QT_QPA_PLATFORM, wayland;xcb
env = QT_QPA_PLATFORMTHEME, qt6ct
env = GDK_BACKEND, wayland,x11
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland

# this is global variable for the DE/WM shared stuff
env = WM_PATH, $HOME/.config/hypr/de
env = WM_SCRIPTS, $HOME/.config/hypr/de/scripts
env = WM_ICONS, $HOME/.config/hypr/de/icons
env = WM_AUDIO, $HOME/.config/hypr/de/audio
